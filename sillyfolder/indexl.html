<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>World's Hardest Maze Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Arimo', Arial, sans-serif;
            background: #e8e8e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            overflow: hidden;
            touch-action: none;
        }
        
        #menu {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            border: 6px solid #000;
            box-shadow: 0 8px 0 #000;
            max-width: 90vw;
        }
        
        h1 {
            color: #d92027;
            font-size: clamp(1em, 4vw, 2em);
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 #000;
            letter-spacing: 2px;
            line-height: 1.4;
        }
        
        .subtitle {
            font-size: clamp(0.4em, 2vw, 0.6em);
            color: #ff6b6b;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .input-group {
            margin: 15px 0;
            background: #f0f0f0;
            padding: 12px;
            border: 3px solid #333;
            border-radius: 8px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: clamp(0.4em, 2vw, 0.6em);
            color: #333;
        }
        
        input {
            padding: 12px;
            font-size: clamp(0.6em, 2.5vw, 0.8em);
            width: 100%;
            max-width: 200px;
            font-family: 'Press Start 2P', Arial, sans-serif;
            border: 3px solid #333;
            background: white;
            text-align: center;
        }
        
        button {
            background: #d92027;
            color: white;
            border: 5px solid #000;
            padding: 15px 30px;
            font-size: clamp(0.5em, 2.5vw, 0.8em);
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Press Start 2P', Arial, sans-serif;
            border-radius: 10px;
            box-shadow: 0 6px 0 #8b0000;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        
        button:hover {
            background: #b01520;
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8b0000;
        }
        
        #gameContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            justify-content: center;
        }
        
        #stats {
            background: white;
            padding: 15px 25px;
            margin-bottom: 15px;
            border-radius: 10px;
            font-size: clamp(0.4em, 2vw, 0.7em);
            border: 5px solid #000;
            box-shadow: 0 6px 0 #000;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            color: #d92027;
            font-weight: bold;
        }
        
        #canvasWrapper {
            position: relative;
            border: 8px solid #000;
            box-shadow: 0 10px 0 #000, 0 0 0 12px #d92027;
            background: white;
            max-width: 95vw;
            max-height: 70vh;
        }
        
        #canvas {
            display: block;
            touch-action: none;
        }
        
        .warning {
            color: #d92027;
            font-size: clamp(0.4em, 2vw, 0.5em);
            margin-top: 15px;
            animation: blink 1s infinite;
            line-height: 1.6;
        }
        
        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }
        
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            gap: 10px;
        }
        
        .control-pad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 8px;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            background: white;
            border: 4px solid #000;
            border-radius: 10px;
            font-size: 1.5em;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #000;
            touch-action: none;
        }
        
        .control-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
            background: #d92027;
            color: white;
        }
        
        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }
        
        @media (max-width: 768px) {
            #mobileControls {
                display: block;
            }
            #canvasWrapper {
                max-height: 50vh;
            }
        }
        
        @media (orientation: landscape) and (max-width: 768px) {
            #canvasWrapper {
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>WORLD'S<br>HARDEST<br>MAZE</h1>
        <p class="subtitle">REQUIRES 5 EXPERT<br>MATHEMATICIANS<br>TO SOLVE</p>
        
        <div class="input-group">
            <label>MAZE WIDTH</label>
            <input type="number" id="widthInput" value="40" min="15" max="80">
        </div>
        
        <div class="input-group">
            <label>MAZE HEIGHT</label>
            <input type="number" id="heightInput" value="40" min="15" max="80">
        </div>
        
        <div class="input-group">
            <label>KILLERS</label>
            <input type="number" id="killersInput" value="12" min="3" max="40">
        </div>
        
        <button onclick="startGame()">START</button>
        <p class="warning">⚠ TOUCH WALL = DEATH ⚠</p>
    </div>

    <div id="gameContainer">
        <div id="stats">
            <div class="stat-item">
                <span class="stat-label">DEATHS:</span>
                <span class="stat-value" id="deaths">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">TIME:</span>
                <span class="stat-value" id="time">0.0s</span>
            </div>
        </div>
        <div id="canvasWrapper">
            <canvas id="canvas"></canvas>
        </div>
        <div id="mobileControls">
            <div class="control-pad">
                <div class="control-btn up" id="upBtn">▲</div>
                <div class="control-btn down" id="downBtn">▼</div>
                <div class="control-btn left" id="leftBtn">◀</div>
                <div class="control-btn right" id="rightBtn">▶</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let maze, player, killers, goal;
        let cellSize = 16;
        let mazeWidth, mazeHeight;
        let deaths = 0;
        let startTime, animationId;
        let keys = {};
        let mobileKeys = {};
        
        // Audio context for music
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let musicPlaying = false;
        let oscillators = [];

        function playRetroMusic() {
            if (musicPlaying) return;
            musicPlaying = true;
            
            // Classic game music pattern - repetitive and annoying
            const melodyNotes = [
                { freq: 523.25, duration: 0.2 }, // C5
                { freq: 587.33, duration: 0.2 }, // D5
                { freq: 659.25, duration: 0.2 }, // E5
                { freq: 698.46, duration: 0.2 }, // F5
                { freq: 783.99, duration: 0.4 }, // G5
                { freq: 698.46, duration: 0.2 }, // F5
                { freq: 659.25, duration: 0.2 }, // E5
                { freq: 587.33, duration: 0.4 }, // D5
            ];
            
            let noteIndex = 0;
            let baseLine = 0;
            
            function playNote() {
                if (!musicPlaying) return;
                
                // Melody
                const note = melodyNotes[noteIndex % melodyNotes.length];
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.frequency.value = note.freq;
                osc.type = 'square';
                
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + note.duration);
                
                osc.start();
                osc.stop(audioCtx.currentTime + note.duration);
                
                // Bassline
                const bassFreqs = [130.81, 146.83, 164.81]; // C3, D3, E3
                const bass = audioCtx.createOscillator();
                const bassGain = audioCtx.createGain();
                
                bass.connect(bassGain);
                bassGain.connect(audioCtx.destination);
                
                bass.frequency.value = bassFreqs[baseLine % bassFreqs.length];
                bass.type = 'sawtooth';
                
                bassGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                bassGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + note.duration);
                
                bass.start();
                bass.stop(audioCtx.currentTime + note.duration);
                
                noteIndex++;
                if (noteIndex % 4 === 0) baseLine++;
                
                setTimeout(playNote, note.duration * 1000);
            }
            
            playNote();
        }

        function startGame() {
            mazeWidth = parseInt(document.getElementById('widthInput').value);
            mazeHeight = parseInt(document.getElementById('heightInput').value);
            const numKillers = parseInt(document.getElementById('killersInput').value);
            
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            
            // Responsive canvas sizing
            const maxWidth = Math.min(window.innerWidth * 0.9, 800);
            const maxHeight = Math.min(window.innerHeight * 0.6, 600);
            
            const aspectRatio = mazeWidth / mazeHeight;
            let canvasWidth = maxWidth;
            let canvasHeight = canvasWidth / aspectRatio;
            
            if (canvasHeight > maxHeight) {
                canvasHeight = maxHeight;
                canvasWidth = canvasHeight * aspectRatio;
            }
            
            cellSize = Math.floor(Math.min(canvasWidth / mazeWidth, canvasHeight / mazeHeight));
            
            canvas.width = mazeWidth * cellSize;
            canvas.height = mazeHeight * cellSize;
            
            generateMaze();
            initPlayer();
            initKillers(numKillers);
            
            deaths = 0;
            startTime = Date.now();
            
            playRetroMusic();
            setupMobileControls();
            gameLoop();
        }

        function setupMobileControls() {
            const buttons = {
                upBtn: 'ArrowUp',
                downBtn: 'ArrowDown',
                leftBtn: 'ArrowLeft',
                rightBtn: 'ArrowRight'
            };
            
            for (const [btnId, key] of Object.entries(buttons)) {
                const btn = document.getElementById(btnId);
                
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    mobileKeys[key] = true;
                });
                
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    mobileKeys[key] = false;
                });
                
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    mobileKeys[key] = true;
                });
                
                btn.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    mobileKeys[key] = false;
                });
            }
        }

        function generateMaze() {
            maze = Array(mazeHeight).fill().map(() => Array(mazeWidth).fill(1));
            
            const stack = [];
            const startX = 0;
            const startY = 0;
            
            maze[startY][startX] = 0;
            stack.push([startX, startY]);
            
            const directions = [[0, -2], [2, 0], [0, 2], [-2, 0]];
            
            while (stack.length > 0) {
                const [x, y] = stack[stack.length - 1];
                const neighbors = [];
                
                for (const [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;
                    
                    if (nx >= 0 && nx < mazeWidth && ny >= 0 && ny < mazeHeight && maze[ny][nx] === 1) {
                        neighbors.push([nx, ny, dx, dy]);
                    }
                }
                
                if (neighbors.length > 0) {
                    const [nx, ny, dx, dy] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[ny][nx] = 0;
                    maze[y + dy/2][x + dx/2] = 0;
                    stack.push([nx, ny]);
                } else {
                    stack.pop();
                }
            }
            
            goal = {
                x: (mazeWidth - 1) * cellSize + cellSize/2,
                y: (mazeHeight - 1) * cellSize + cellSize/2
            };
            maze[mazeHeight - 1][mazeWidth - 1] = 0;
            if (mazeWidth > 1) maze[mazeHeight - 1][mazeWidth - 2] = 0;
            if (mazeHeight > 1) maze[mazeHeight - 2][mazeWidth - 1] = 0;
        }

        function initPlayer() {
            player = {
                x: cellSize/2,
                y: cellSize/2,
                radius: cellSize * 0.3,
                speed: 2.5
            };
        }

        function initKillers(num) {
            killers = [];
            for (let i = 0; i < num; i++) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * mazeWidth);
                    y = Math.floor(Math.random() * mazeHeight);
                } while (maze[y][x] === 1 || (x === 0 && y === 0) || (x === mazeWidth - 1 && y === mazeHeight - 1));
                
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 1.5;
                
                killers.push({
                    x: x * cellSize + cellSize/2,
                    y: y * cellSize + cellSize/2,
                    radius: cellSize * 0.25,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed
                });
            }
        }

        function checkWallCollision(x, y, radius) {
            const cellX = Math.floor(x / cellSize);
            const cellY = Math.floor(y / cellSize);
            
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const checkX = cellX + dx;
                    const checkY = cellY + dy;
                    
                    if (checkX >= 0 && checkX < mazeWidth && checkY >= 0 && checkY < mazeHeight) {
                        if (maze[checkY][checkX] === 1) {
                            const wallLeft = checkX * cellSize;
                            const wallRight = (checkX + 1) * cellSize;
                            const wallTop = checkY * cellSize;
                            const wallBottom = (checkY + 1) * cellSize;
                            
                            const closestX = Math.max(wallLeft, Math.min(x, wallRight));
                            const closestY = Math.max(wallTop, Math.min(y, wallBottom));
                            
                            const distX = x - closestX;
                            const distY = y - closestY;
                            const dist = Math.sqrt(distX * distX + distY * distY);
                            
                            if (dist < radius) return true;
                        }
                    }
                }
            }
            return false;
        }

        function resetPlayer() {
            deaths++;
            document.getElementById('deaths').textContent = deaths;
            initPlayer();
            
            // Death sound
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 100;
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function updatePlayer() {
            let dx = 0, dy = 0;
            
            const isUp = keys['ArrowUp'] || keys['w'] || mobileKeys['ArrowUp'];
            const isDown = keys['ArrowDown'] || keys['s'] || mobileKeys['ArrowDown'];
            const isLeft = keys['ArrowLeft'] || keys['a'] || mobileKeys['ArrowLeft'];
            const isRight = keys['ArrowRight'] || keys['d'] || mobileKeys['ArrowRight'];
            
            if (isLeft) dx -= player.speed;
            if (isRight) dx += player.speed;
            if (isUp) dy -= player.speed;
            if (isDown) dy += player.speed;
            
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }
            
            const newX = player.x + dx;
            const newY = player.y + dy;
            
            if (!checkWallCollision(newX, player.y, player.radius)) {
                player.x = newX;
            } else {
                resetPlayer();
                return;
            }
            
            if (!checkWallCollision(player.x, newY, player.radius)) {
                player.y = newY;
            } else {
                resetPlayer();
                return;
            }
            
            const distToGoal = Math.sqrt((player.x - goal.x)**2 + (player.y - goal.y)**2);
            if (distToGoal < player.radius + cellSize * 0.3) {
                musicPlaying = false;
                const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
                
                // Victory sound
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.5);
                    }, i * 150);
                });
                
                setTimeout(() => {
                    alert(`YOU WON!\nTIME: ${finalTime}s\nDEATHS: ${deaths}`);
                    location.reload();
                }, 500);
            }
        }

        function updateKillers() {
            for (const killer of killers) {
                killer.x += killer.vx;
                killer.y += killer.vy;
                
                if (checkWallCollision(killer.x, killer.y, killer.radius)) {
                    killer.vx *= -1;
                    killer.vy *= -1;
                    killer.x += killer.vx * 2;
                    killer.y += killer.vy * 2;
                }
                
                if (killer.x < killer.radius || killer.x > canvas.width - killer.radius) {
                    killer.vx *= -1;
                }
                if (killer.y < killer.radius || killer.y > canvas.height - killer.radius) {
                    killer.vy *= -1;
                }
                
                const dist = Math.sqrt((player.x - killer.x)**2 + (player.y - killer.y)**2);
                if (dist < player.radius + killer.radius) {
                    resetPlayer();
                }
            }
        }

        function drawCheckeredBackground(x, y, w, h) {
            const checkSize = cellSize / 2;
            for (let cy = 0; cy < h; cy += checkSize) {
                for (let cx = 0; cx < w; cx += checkSize) {
                    const isLight = (Math.floor((x + cx) / checkSize) + Math.floor((y + cy) / checkSize)) % 2 === 0;
                    ctx.fillStyle = isLight ? '#b8d4ff' : '#9ec5ff';
                    ctx.fillRect(x + cx, y + cy, checkSize, checkSize);
                }
            }
        }

        function draw() {
            // Draw checkered paths
            for (let y = 0; y < mazeHeight; y++) {
                for (let x = 0; x < mazeWidth; x++) {
                    if (maze[y][x] === 0) {
                        drawCheckeredBackground(x * cellSize, y * cellSize, cellSize, cellSize);
                    } else {
                        // Walls - white with black border
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        ctx.strokeStyle = '#000000';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // Draw goal - green circle (like coin in original)
            ctx.fillStyle = '#4caf50';
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, cellSize * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#2e7d32';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Inner highlight
            ctx.fillStyle = '#81c784';
            ctx.beginPath();
            ctx.arc(goal.x - cellSize * 0.1, goal.y - cellSize * 0.1, cellSize * 0.12, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw killers - red squares like original
            for (const killer of killers) {
                const size = killer.radius * 2;
                ctx.fillStyle = '#d92027';
                ctx.fillRect(killer.x - killer.radius, killer.y - killer.radius, size, size);
                ctx.strokeStyle = '#8b0000';
                ctx.lineWidth = 2;
                ctx.strokeRect(killer.x - killer.radius, killer.y - killer.radius, size, size);
            }
            
            // Draw player - blue circle
            ctx.fillStyle = '#2196f3';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#0d47a1';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Inner highlight
            ctx.fillStyle = '#64b5f6';
            ctx.beginPath();
            ctx.arc(player.x - player.radius * 0.3, player.y - player.radius * 0.3, player.radius * 0.4, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            updatePlayer();
            updateKillers();
            draw();
            
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('time').textContent = elapsed + 's';
            
            animationId = requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Prevent context menu on long press
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
