<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Silly Pen Maze</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Indie+Flower&family=Permanent+Marker&display=swap');
body{background:#fdfcf0 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><path d="M0 20 L100 20 M20 0 L20 100" stroke="%23cbe6ff" stroke-width="1"/></svg>'); font-family:'Indie Flower',cursive;color:#2c3e50;display:flex;flex-direction:column;align-items:center;margin:0;overflow:hidden}
h1{font-family:'Permanent Marker',cursive;text-decoration:underline 2px solid #34495e;}
canvas{border:3px solid #34495e;border-radius:2px 255px 3px 255px/255px 5px 225px 3px;background:rgba(255,255,255,0.8);box-shadow:3px 4px 0 rgba(0,0,0,0.1);cursor:crosshair;}
.ui,.controls{display:flex;gap:10px;margin:10px;flex-wrap:wrap;justify-content:center}
button,select,input{font-family:'Indie Flower',cursive;font-size:18px;background:none;border:2px solid #34495e;border-radius:255px 15px 225px 15px/15px 225px 15px 255px;padding:5px 15px;cursor:pointer;transition:all .2s;color:#2c3e50;outline:none}
button:hover{background:#34495e;color:#fff}
.pad{display:grid;grid-template-columns:repeat(3,40px);gap:5px;}
.pad button{padding:0;height:40px;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<h1>silly maze</h1>
<div class="ui" id="menu">
<button onclick="startGame('bot')">Bot Mode</button>
<select id="diff"><option value="EZ">EZ</option><option value="MEDIUM">MEDIUM</option><option value="HARD">HARD</option><option value="nightmare">nightmare</option></select>
<button onclick="startGame('versus')">Versus</button>
<input type="text" id="token" placeholder="Bot Token/Room" value="room1">
<button onclick="startGame('multi')">Multiplayer</button>
</div>
<canvas id="c" width="600" height="400"></canvas>
<div class="controls" id="ctrls" style="display:none">
<div class="pad" id="wasdPad"><button></button><button onclick="move(1,0,-1)">W</button><button></button><button onclick="move(1,-1,0)">A</button><button onclick="move(1,0,1)">S</button><button onclick="move(1,1,0)">D</button></div>
<div class="pad" id="arrowPad"><button></button><button onclick="move(0,0,-1)">↑</button><button></button><button onclick="move(0,-1,0)">←</button><button onclick="move(0,0,1)">↓</button><button onclick="move(0,1,0)">→</button></div>
</div>
<script>
const ctx=c.getContext('2d'), W=30, H=20, CS=20; let maze=[], p1={x:0,y:0,c:'#e74c3c'}, p2={x:W-1,y:H-1,c:'#2980b9'}, mode='', diffs={EZ:500,MEDIUM:250,HARD:100,nightmare:25}, botTmr=0, ws=null;
function drawSillyLine(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1+(Math.random()-0.5)*3,y1+(Math.random()-0.5)*3);ctx.lineTo(x2+(Math.random()-0.5)*3,y2+(Math.random()-0.5)*3);ctx.stroke();}
function genEller(){maze=[];let sets=[],nSet=1;for(let y=0;y<H;y++){let r=[];for(let x=0;x<W;x++){let cell={x,y,r:1,b:1,s:0};if(y>0&&!maze[y-1][x].b)cell.s=maze[y-1][x].s;else cell.s=nSet++;r.push(cell)}for(let x=0;x<W-1;x++){if(r[x].s!==r[x+1].s&&(y===H-1||Math.random()>.5)){r[x].r=0;let old=r[x+1].s;r.forEach(c=>{if(c.s===old)c.s=r[x].s})}}if(y<H-1){let sMap={};r.forEach(c=>(sMap[c.s]=sMap[c.s]||[]).push(c));for(let k in sMap){let arr=sMap[k];for(let i=0;i<Math.ceil(Math.random()*arr.length);i++)arr[Math.floor(Math.random()*arr.length)].b=0}}maze.push(r)}}
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.strokeStyle='#2c3e50';ctx.lineWidth=2;ctx.lineCap='round';maze.forEach((r,y)=>r.forEach((cell,x)=>{let px=x*CS,py=y*CS;if(cell.r)drawSillyLine(px+CS,py,px+CS,py+CS);if(cell.b)drawSillyLine(px,py+CS,px+CS,py+CS);if(x===0)drawSillyLine(px,py,px,py+CS);if(y===0)drawSillyLine(px,py,px+CS,py);}));const dp=(p,shape)=>{ctx.fillStyle=p.c;ctx.beginPath();if(shape==='c')ctx.arc(p.x*CS+CS/2,p.y*CS+CS/2,CS/3,0,Math.PI*2);else ctx.rect(p.x*CS+CS/4,p.y*CS+CS/4,CS/2,CS/2);ctx.fill();};dp(p1,'c');if(mode==='versus'||mode==='bot'||mode==='multi')dp(p2,'r');}
function aStar(){let open=[{x:p2.x,y:p2.y,g:0,f:Math.abs(p2.x-p1.x)+Math.abs(p2.y-p1.y),p:null}],closed=new Set();while(open.length){open.sort((a,b)=>a.f-b.f);let curr=open.shift();if(curr.x===p1.x&&curr.y===p1.y){let path=[];while(curr.p){path.unshift({x:curr.x,y:curr.y});curr=curr.p;}return path[0];}closed.add(`${curr.x},${curr.y}`);let neighbors=[{x:curr.x,y:curr.y-1,d:'u'},{x:curr.x+1,y:curr.y,d:'r'},{x:curr.x,y:curr.y+1,d:'d'},{x:curr.x-1,y:curr.y,d:'l'}].filter(n=>{if(n.x<0||n.x>=W||n.y<0||n.y>=H)return !1;if(n.d==='u'&&maze[n.y][n.x].b)return !1;if(n.d==='r'&&maze[curr.y][curr.x].r)return !1;if(n.d==='d'&&maze[curr.y][curr.x].b)return !1;if(n.d==='l'&&maze[curr.y][n.x].r)return !1;return !closed.has(`${n.x},${n.y}`)});neighbors.forEach(n=>{let g=curr.g+1,f=g+Math.abs(n.x-p1.x)+Math.abs(n.y-p1.y),ex=open.find(o=>o.x===n.x&&o.y===n.y);if(!ex)open.push({...n,g,f,p:curr});else if(g<ex.g){ex.g=g;ex.f=f;ex.p=curr;}})}return null;}
function move(pid,dx,dy){let p=pid===0?p1:p2;if(dx===1&&!maze[p.y][p.x].r)p.x++;else if(dx===-1&&p.x>0&&!maze[p.y][p.x-1].r)p.x--;else if(dy===1&&!maze[p.y][p.x].b)p.y++;else if(dy===-1&&p.y>0&&!maze[p.y-1][p.x].b)p.y--;draw();if(mode==='multi'&&ws&&ws.readyState===1)ws.send(JSON.stringify({type:'move',x:p1.x,y:p1.y}));}
window.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key))e.preventDefault();if(e.key==='ArrowUp')move(0,0,-1);if(e.key==='ArrowDown')move(0,0,1);if(e.key==='ArrowLeft')move(0,-1,0);if(e.key==='ArrowRight')move(0,1,0);if(mode==='versus'){if(e.key==='w')move(1,0,-1);if(e.key==='s')move(1,0,1);if(e.key==='a')move(1,-1,0);if(e.key==='d')move(1,1,0);}});
function botLoop(){if(mode!=='bot')return;let next=aStar();if(next){p2.x=next.x;p2.y=next.y;draw();if(p1.x===p2.x&&p1.y===p2.y){alert('Bot got ya!');return;}botTmr=setTimeout(botLoop,diffs[document.getElementById('diff').value]);}else alert('Stuck bot!');}
function startGame(m){mode=m;genEller();p1={x:0,y:0,c:'#e74c3c'};p2={x:W-1,y:H-1,c:'#2980b9'};document.getElementById('ctrls').style.display='flex';if(botTmr)clearTimeout(botTmr);if(ws)ws.close();if(m==='bot')botLoop();if(m==='multi'){let tok=document.getElementById('token').value;ws=new WebSocket('wss://echo.websocket.org');ws.onopen=()=>console.log('Joined room:',tok);ws.onmessage=e=>{try{let d=JSON.parse(e.data);if(d.type==='move'){p2.x=d.x;p2.y=d.y;draw()}}catch(err){}}}draw();}
genEller();draw();
</script>
</body>
</html>
