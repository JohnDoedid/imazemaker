<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>worlds hardest maze game</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    
    body {
        font-family: 'Arial Black', Impact, Arial, sans-serif;
        background: #b4ebb4;
        color: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }
    
    #menu {
        text-align: center;
        background: #ffffff;
        padding: 40px;
        max-width: 90vw;
    }
    
    h1 {
        color: #ff0000;
        font-size: clamp(2em, 6vw, 3.5em);
        font-weight: 900;
        margin-bottom: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        -webkit-text-stroke: 2px #000; 
    }
    
    .subtitle {
        font-size: clamp(1em, 2vw, 1.2em);
        color: #000;
        margin-bottom: 30px;
        font-weight: bold;
        text-transform: uppercase;
    }
    
    .controls-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        margin: 25px 0;
    }
    
    .input-group {
        background: #e6e6e6;
        padding: 20px;
    }
    
    label {
        display: block;
        margin-bottom: 10px;
        font-size: clamp(0.9em, 2vw, 1em);
        color: #000;
        font-weight: 900;
        text-transform: uppercase;
    }
    
    input {
        padding: 12px;
        font-size: clamp(1em, 2.5vw, 1.2em);
        width: 100%;
        border: 4px solid #000;
        background: white;
        text-align: center;
        font-weight: 900;
        font-family: 'Arial Black', Impact, sans-serif;
        color: #0000ff;
    }
    
    input:focus {
        outline: none;
        background: #e6f2ff;
        border-color: #0000ff;
    }
    
    .button-group {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 35px;
    }
    
    button {
        background: #0000ff;
        color: white;
        border: 5px solid #000;
        padding: 15px 40px;
        font-family: 'Arial Black', Impact, sans-serif;
        font-size: clamp(1em, 2.5vw, 1.2em);
        cursor: pointer;
        font-weight: 900;
        text-transform: uppercase;
    }
    
    button:hover {
        background: #3333ff;
    }
    
    button:active {
        background: #0000cc;
    }
    
    button.secondary {
        background: #ff0000;
    }
    
    button.secondary:hover {
        background: #ff3333;
    }
    
    #gameContainer {
        display: none;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100vh;
        justify-content: center;
        gap: 20px;
        background: #e5e5e5;
    }
    
    #stats {
        background: white;
        padding: 15px 40px;
        font-size: clamp(1em, 2.5vw, 1.2em);
        font-family: 'Arial Black', Impact, sans-serif;
        border: 5px solid #000;
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
        text-transform: uppercase;
    }
    
    .stat-item {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .stat-label {
        color: #000;
        font-weight: 900;
    }
    
    .stat-value {
        color: #0000ff;
        font-weight: 900;
        font-size: 1.3em;
    }
    
    #gameWrapper {
        border: 8px solid #000;
        background: #ffffff;
        max-width: 95vw;
        max-height: 70vh;
        overflow: hidden;
        position: relative;
    }
    
    #svgGame {
        display: block;
        max-width: 100%;
        max-height: 70vh;
        background-color: #ffffff;
        background-image: 
            linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
            linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
            linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
            linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
        background-size: 40px 40px;
        background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
    }
    
    .warning {
        color: #ff0000;
        font-size: clamp(0.9em, 2.5vw, 1.1em);
        margin-top: 20px;
        font-weight: 900;
        text-transform: uppercase;
        background: #ffe6e6;
        padding: 12px;
        border: 4px solid #000;
        display: inline-block;
    }
    
    #mobileControls {
        display: none;
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
    }
    
    .joystick-container {
        width: 150px;
        height: 150px;
        background: rgba(255, 255, 255, 0.9);
        border: 5px solid #000;
        border-radius: 50%;
        position: relative;
        touch-action: none;
    }
    
    .joystick-knob {
        width: 60px;
        height: 60px;
        background: #0000ff;
        border: 4px solid #000;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: background 0.1s;
    }
    
    .joystick-knob.active {
        background: #ff0000;
    }
    
    #scoreBoard {
        background: white;
        padding: 25px;
        border: 5px solid #000;
        margin-top: 20px;
        max-height: 220px;
        overflow-y: auto;
    }
    
    #scoreBoard h3 {
        color: #000;
        margin-bottom: 15px;
        font-size: 1.5em;
        text-transform: uppercase;
        font-weight: 900;
        border-bottom: 4px solid #000;
        padding-bottom: 10px;
        text-align: center;
    }
    
    .score-entry {
        padding: 12px;
        margin: 8px 0;
        background: #b4ebb4;
        border: 4px solid #000;
        display: flex;
        justify-content: space-between;
        font-size: 1em;
        font-weight: 900;
        color: #000;
        text-transform: uppercase;
    }
    
    #victoryScreen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 10000;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 30px;
    }
    
    .victory-message {
        background: #ff0000;
        color: white;
        padding: 40px 60px;
        border: 8px solid #000;
        font-size: clamp(1.5em, 4vw, 2.5em);
        font-weight: 900;
        text-transform: uppercase;
        text-align: center;
        max-width: 80vw;
        line-height: 1.4;
        -webkit-text-stroke: 2px #000;
    }
    
    .next-level-btn {
        background: #0000ff;
        color: white;
        border: 8px solid #000;
        padding: 20px 50px;
        font-family: 'Arial Black', Impact, sans-serif;
        font-size: clamp(1.2em, 3vw, 1.8em);
        cursor: pointer;
        font-weight: 900;
        text-transform: uppercase;
    }
    
    @media (max-width: 768px) {
        #mobileControls {
            display: block;
        }
        .controls-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>
    <div id="menu">
        <h1>world's HARDEST maze</h1>
        <p class="subtitle">touch wall = DEAD</p>
        
        <div class="controls-grid">
            <div class="input-group">
                <label>width</label>
                <input type="number" id="widthInput" value="50" min="20" max="100">
            </div>
            
            <div class="input-group">
                <label>height</label>
                <input type="number" id="heightInput" value="50" min="20" max="100">
            </div>
            
            <div class="input-group">
                <label>ENEMIES</label>
                <input type="number" id="killersInput" value="20" min="5" max="50">
            </div>
        </div>
        
        <div class="button-group">
            <button onclick="startGame()">START</button>
            <button class="secondary" onclick="toggleScores()">SCORES</button>
        </div>
        
        <p class="warning">WARNING: this game is extremely hard</p>
        
        <div id="scoreBoard" style="display: none;">
            <h3>YOUR TOP SCORES</h3>
            <div id="scoreList"></div>
        </div>
    </div>

    <div id="gameContainer">
        <div id="stats">
            <div class="stat-item">
                <span class="stat-label">DEATHS:</span>
                <span class="stat-value" id="deaths">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">TIME:</span>
                <span class="stat-value" id="time">0.0s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">LEVEL:</span>
                <span class="stat-value" id="level">1</span>
            </div>
        </div>
        
        <div id="gameWrapper">
            <svg id="svgGame" xmlns="http://www.w3.org/2000/svg">
                <g id="mazeGroup"></g>
                <g id="goalGroup"></g>
                <g id="killersGroup"></g>
                <g id="playerGroup"></g>
            </svg>
        </div>
        
        <div id="mobileControls">
            <div class="joystick-container" id="joystick">
                <div class="joystick-knob" id="joystickKnob"></div>
            </div>
        </div>
    </div>

    <div id="victoryScreen">
        <div class="victory-message" id="victoryMessage"></div>
        <button class="next-level-btn" onclick="nextLevel()">CONTINUE</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bytebeatPlaying = false;
        let bytebeatNode = null;
        let workletInitialized = false;

        const workletCode = `
            function bytebeat1(t) {
                const r = t / 7938;
                const a = 619, b = 1180;
                const notes = [a, a, 601, 584, b, b, 55, 38];
                const index = (Math.floor(r / 8) & 7) + ((r & 15) == 7 ? 1 : 0);
                const note = notes[index];
                const freq = note >> (Math.floor(r * 18) % 12 & 12) & 15;
                
                const v1 = (t * Math.pow(2, freq / 12) & 128) * Math.max(((2981555643 >> (Math.floor(r * 2) & 30) & 3) - r % 1) / 4, 0) * 0.9;
                const v2 = (t * Math.pow(2, ((546914935 >> (Math.floor(r / 2) & 28) & 15) - 5 * (14576 >> (r & 15) & 1)) / 12) & 511) * ((3204176859 >> (Math.floor(r * 2) & 30) & 3) - r % 1) * 0.07;
                
                return v1 + v2;
            }
            
            function bytebeat2(t) {
                const T = t / 5000;
                const b = Math.abs((T & 31) - 16);
                const K = 1 + ((1 - (T >> 5 & 3)) % 2 - 1) / 6;
                
                const M = (T) => {
                    const part1 = (t * Math.pow(2, ([-1, 4, 7][Math.floor(T * 4) % 3 | 0] / 12 + K)) & 128) * (T >> 8 && (12 - T % 12)) / 12;
                    const part2 = (t * Math.pow(2, (K + Math.floor(b / 5) - (5514 >> (b % (T >> 9 ? 4 : 5)) * 4 & 15) / 12)) & 128);
                    return part1 + part2;
                };
                
                return M(T) / 3 + M(T - 3) / 5 + (T >> 7 && (t * Math.pow(2, ((T & 4 && (T & 7) - 1) / 6 - 4)) & 63 * (197 >> T % 8 & 1)) + Math.random() * 32 * (1 - (T + 4) % 8 / 8));
            }

            class BytebeatProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.t = 0;
                    this.currentBytebeat = 0;
                    this.sampleRate = 44100;
                    this.durationSamples = this.sampleRate * 3600;
                }

                process(inputs, outputs, parameters) {
                    const output = outputs[0];
                    const channel = output[0];
                    
                    for (let i = 0; i < channel.length; i++) {
                        let value = this.currentBytebeat === 0 ? bytebeat1(this.t) : bytebeat2(this.t);
                        value = ((value & 255) - 128) / 128;
                        channel[i] = Math.max(-1, Math.min(1, value * 0.3)); 
                        this.t++;
                        
                        if (this.t >= this.durationSamples) {
                            this.t = 0;
                            this.currentBytebeat = 1 - this.currentBytebeat;
                        }
                    }
                    return true;
                }
            }

            registerProcessor('bytebeat-processor', BytebeatProcessor);
        `;

        async function initBytebeat() {
            if (workletInitialized) return;
            try {
                const blob = new Blob([workletCode], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                await audioCtx.audioWorklet.addModule(url);
                workletInitialized = true;
            } catch (e) {
                console.log('Bytebeat will init on interaction');
            }
        }

        async function startBytebeat() {
            try {
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                
                if (!workletInitialized) {
                    await initBytebeat();
                }
                
                if (!bytebeatPlaying && workletInitialized) {
                    bytebeatNode = new AudioWorkletNode(audioCtx, 'bytebeat-processor');
                    bytebeatNode.connect(audioCtx.destination);
                    bytebeatPlaying = true;
                }
            } catch (e) {
                console.error('Bytebeat error:', e);
            }
        }

        function stopBytebeat() {
            bytebeatPlaying = false;
            if (bytebeatNode) {
                bytebeatNode.disconnect();
                bytebeatNode = null;
            }
        }

        // Pre-load on page load
        initBytebeat();

        const svg = document.getElementById('svgGame');
        const mazeGroup = document.getElementById('mazeGroup');
        const playerGroup = document.getElementById('playerGroup');
        const killersGroup = document.getElementById('killersGroup');
        const goalGroup = document.getElementById('goalGroup');
        
        let maze, player, killers, goal;
        let cellSize = 16;
        let mazeWidth, mazeHeight;
        let deaths = 0;
        let startTime, animationId;
        let keys = {};
        let joystickActive = false;
        let joystickAngle = 0;
        let joystickForce = 0;
        let currentLevel = 1;
        let totalDeaths = 0;
        
        const brutalMessages = [
            "THAT WAS TOO EASY\nQUIT NOW",
            "YOU ARE WASTING YOUR TIME",
            "STILL HERE?\nYOU ARE PATHETIC",
            "NOBODY CARES\nSTOP PLAYING",
            "THIS IS MEANINGLESS\nGIVE UP",
            "YOU THINK YOU'RE GOOD?\nYOU'RE NOT",
            "ANOTHER LEVEL?\nWHY BOTHER",
            "YOUR EFFORT IS POINTLESS",
            "STILL TRYING?\nEMBARRASSING",
            "JUST QUIT ALREADY!!!!",
            "YOU ARE SUCK\ning"
        ];
        
        function saveScore(time, deaths, level) {
            const scores = JSON.parse(localStorage.getItem('mazeScores') || '[]');
            scores.push({
                time: time,
                deaths: deaths,
                level: level,
                date: new Date().toISOString()
            });
            scores.sort((a, b) => (a.deaths * 100 + a.time) - (b.deaths * 100 + b.time));
            localStorage.setItem('mazeScores', JSON.stringify(scores.slice(0, 10)));
        }
        
        function loadScores() {
            const scores = JSON.parse(localStorage.getItem('mazeScores') || '[]');
            const scoreList = document.getElementById('scoreList');
            scoreList.innerHTML = '';
            
            if (scores.length === 0) {
                scoreList.innerHTML = '<p style="color: #8899bb; text-align: center;">No scores yet!</p>';
                return;
            }
            
            scores.forEach((score, i) => {
                const entry = document.createElement('div');
                entry.className = 'score-entry';
                entry.innerHTML = `
                    <span>${i + 1}. Level ${score.level}</span>
                    <span>Deaths: ${score.deaths} | Time: ${score.time.toFixed(1)}s</span>
                `;
                scoreList.appendChild(entry);
            });
        }
        
        function toggleScores() {
            const board = document.getElementById('scoreBoard');
            if (board.style.display === 'none') {
                loadScores();
                board.style.display = 'block';
            } else {
                board.style.display = 'none';
            }
        }

        function startGame() {
            mazeWidth = parseInt(document.getElementById('widthInput').value);
            mazeHeight = parseInt(document.getElementById('heightInput').value);
            const numKillers = parseInt(document.getElementById('killersInput').value);
            
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            
            // START TIMER IMMEDIATELY
            startTime = Date.now();
            
            const maxWidth = Math.min(window.innerWidth * 0.9, 900);
            const maxHeight = Math.min(window.innerHeight * 0.65, 650);
            
            const aspectRatio = mazeWidth / mazeHeight;
            let svgWidth = maxWidth;
            let svgHeight = svgWidth / aspectRatio;
            
            if (svgHeight > maxHeight) {
                svgHeight = maxHeight;
                svgWidth = svgHeight * aspectRatio;
            }
            
            cellSize = Math.floor(Math.min(svgWidth / mazeWidth, svgHeight / mazeHeight));
            
            svg.setAttribute('width', mazeWidth * cellSize);
            svg.setAttribute('height', mazeHeight * cellSize);
            svg.setAttribute('viewBox', `0 0 ${mazeWidth * cellSize} ${mazeHeight * cellSize}`);
            
            generateMaze();
            initPlayer();
            initKillers(numKillers);
            drawMaze();
            drawGoal();
            drawPlayer();
            drawKillers();
            
            deaths = 0;
            totalDeaths = 0;
            currentLevel = 1;
            document.getElementById('level').textContent = currentLevel;
            
            // Start bytebeat in background
            startBytebeat();
            setupJoystick();
            gameLoop();
        }

        function setupJoystick() {
            const joystick = document.getElementById('joystick');
            const knob = document.getElementById('joystickKnob');
            
            function handleStart(e) {
                e.preventDefault();
                joystickActive = true;
                knob.classList.add('active');
                handleMove(e);
            }
            
            function handleMove(e) {
                if (!joystickActive) return;
                e.preventDefault();
                
                const rect = joystick.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                const touch = e.touches ? e.touches[0] : e;
                const deltaX = touch.clientX - centerX;
                const deltaY = touch.clientY - centerY;
                
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                const maxDistance = rect.width / 2 - 30;
                
                joystickForce = Math.min(distance / maxDistance, 1);
                joystickAngle = Math.atan2(deltaY, deltaX);
                
                const knobX = Math.cos(joystickAngle) * Math.min(distance, maxDistance);
                const knobY = Math.sin(joystickAngle) * Math.min(distance, maxDistance);
                
                knob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
            }
            
            function handleEnd(e) {
                e.preventDefault();
                joystickActive = false;
                joystickForce = 0;
                knob.classList.remove('active');
                knob.style.transform = 'translate(-50%, -50%)';
            }
            
            joystick.addEventListener('touchstart', handleStart);
            joystick.addEventListener('touchmove', handleMove);
            joystick.addEventListener('touchend', handleEnd);
            joystick.addEventListener('mousedown', handleStart);
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('mouseup', handleEnd);
        }

        function generateMaze() {
    maze = Array(mazeHeight).fill().map(() => Array(mazeWidth).fill(1));
    
    const stack = [];
    const startX = 0;
    const startY = 0;
    
    maze[startY][startX] = 0;
    stack.push([startX, startY]);
    
    const directions = [[0, -2], [2, 0], [0, 2], [-2, 0]];
    
    // THE GROWING TREE: MIX OF DFS AND PRIM'S FOR UNPREDICTABLE PATHS
    while (stack.length > 0) {
        // 75% chance for DFS (long paths), 25% chance for Prim's (chaotic branching)
        let index = stack.length - 1;
        if (Math.random() < 0.25) {
            index = Math.floor(Math.random() * stack.length);
        }
        
        const [x, y] = stack[index];
        const neighbors = [];
        
        for (const [dx, dy] of directions) {
            const nx = x + dx;
            const ny = y + dy;
            
            if (nx >= 0 && nx < mazeWidth && ny >= 0 && ny < mazeHeight && maze[ny][nx] === 1) {
                neighbors.push([nx, ny, dx, dy]);
            }
        }
        
        if (neighbors.length > 0) {
            const [nx, ny, dx, dy] = neighbors[Math.floor(Math.random() * neighbors.length)];
            maze[ny][nx] = 0;
            maze[y + dy/2][x + dx/2] = 0;
            stack.push([nx, ny]);
        } else {
            stack.splice(index, 1);
        }
    }
    
    // SMART BRAIDING: ELIMINATE DEAD ENDS TO CREATE CONFUSING INFINITE LOOPS
    for (let y = 0; y < mazeHeight; y += 2) {
        for (let x = 0; x < mazeWidth; x += 2) {
            if (maze[y][x] === 0) {
                let walls = [];
                if (y > 0 && maze[y-1][x] === 1) walls.push([x, y-1]);
                if (y < mazeHeight - 1 && maze[y+1][x] === 1) walls.push([x, y+1]);
                if (x > 0 && maze[y][x-1] === 1) walls.push([x-1, y]);
                if (x < mazeWidth - 1 && maze[y][x+1] === 1) walls.push([x+1, y]);
                
                // If the path is a dead end (exactly 3 surrounding walls)
                if (walls.length === 3 && Math.random() < 0.6) {
                    // Find a wall that successfully connects to an already existing path
                    const validWalls = walls.filter(([wx, wy]) => {
                        const acrossX = x + (wx - x) * 2;
                        const acrossY = y + (wy - y) * 2;
                        return acrossX >= 0 && acrossX < mazeWidth && 
                               acrossY >= 0 && acrossY < mazeHeight && 
                               maze[acrossY][acrossX] === 0;
                    });
                    
                    if (validWalls.length > 0) {
                        const [wx, wy] = validWalls[Math.floor(Math.random() * validWalls.length)];
                        maze[wy][wx] = 0; // Break the wall
                    }
                }
            }
        }
    }
    
    // STANDARD GOAL ASSIGNMENT
    goal = {
        x: (mazeWidth - 1) * cellSize + cellSize/2,
        y: (mazeHeight - 1) * cellSize + cellSize/2
    };
    maze[mazeHeight - 1][mazeWidth - 1] = 0;
    if (mazeWidth > 1) maze[mazeHeight - 1][mazeWidth - 2] = 0;
    if (mazeHeight > 1) maze[mazeHeight - 2][mazeWidth - 1] = 0;
        }

        function drawMaze() {
            mazeGroup.innerHTML = '';
            
            for (let y = 0; y < mazeHeight; y++) {
                for (let x = 0; x < mazeWidth; x++) {
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', x * cellSize);
                    rect.setAttribute('y', y * cellSize);
                    rect.setAttribute('width', cellSize);
                    rect.setAttribute('height', cellSize);
                    
                    if (maze[y][x] === 1) {
                        rect.setAttribute('fill', '#000');
                        rect.setAttribute('stroke', '#000');
                        rect.setAttribute('stroke-width', '1');
                    } else {
                        rect.setAttribute('fill', '#fff');
                        rect.setAttribute('stroke', '#ddd');
                        rect.setAttribute('stroke-width', '0.5');
                    }
                    
                    mazeGroup.appendChild(rect);
                }
            }
        }

        function initPlayer() {
            player = {
                x: cellSize/2,
                y: cellSize/2,
                radius: cellSize * 0.35,
                speed: 6
            };
        }

        function drawPlayer() {
            playerGroup.innerHTML = '';
            
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', player.x);
            circle.setAttribute('cy', player.y);
            circle.setAttribute('r', player.radius);
            circle.setAttribute('fill', '#2196f3');
            circle.setAttribute('stroke', '#1565c0');
            circle.setAttribute('stroke-width', '2');
            playerGroup.appendChild(circle);
        }

        function initKillers(num) {
            killers = [];
            for (let i = 0; i < num; i++) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * mazeWidth);
                    y = Math.floor(Math.random() * mazeHeight);
                } while (maze[y][x] === 1 || (x === 0 && y === 0) || (x === mazeWidth - 1 && y === mazeHeight - 1));
                
                const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
                const dir = dirs[Math.floor(Math.random() * dirs.length)];
                
                killers.push({
                    x: x * cellSize + cellSize/2,
                    y: y * cellSize + cellSize/2,
                    radius: cellSize * 0.3,
                    speed: 2 + Math.random() * 1.5,
                    dir: dir
                });
            }
        }

        function drawKillers() {
            killersGroup.innerHTML = '';
            
            killers.forEach((killer) => {
                const square = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                const size = killer.radius * 2;
                square.setAttribute('x', killer.x - size/2);
                square.setAttribute('y', killer.y - size/2);
                square.setAttribute('width', size);
                square.setAttribute('height', size);
                square.setAttribute('fill', '#d92027');
                square.setAttribute('stroke', '#8b0000');
                square.setAttribute('stroke-width', '2');
                killersGroup.appendChild(square);
            });
        }

        function drawGoal() {
            goalGroup.innerHTML = '';
            
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', goal.x);
            circle.setAttribute('cy', goal.y);
            circle.setAttribute('r', cellSize * 0.4);
            circle.setAttribute('fill', '#ffd700');
            circle.setAttribute('stroke', '#b8860b');
            circle.setAttribute('stroke-width', '2');
            goalGroup.appendChild(circle);
        }

        function checkWallCollision(x, y, radius) {
            const cellX = Math.floor(x / cellSize);
            const cellY = Math.floor(y / cellSize);
            
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const checkX = cellX + dx;
                    const checkY = cellY + dy;
                    
                    if (checkX >= 0 && checkX < mazeWidth && checkY >= 0 && checkY < mazeHeight) {
                        if (maze[checkY][checkX] === 1) {
                            const wallLeft = checkX * cellSize;
                            const wallRight = (checkX + 1) * cellSize;
                            const wallTop = checkY * cellSize;
                            const wallBottom = (checkY + 1) * cellSize;
                            
                            const closestX = Math.max(wallLeft, Math.min(x, wallRight));
                            const closestY = Math.max(wallTop, Math.min(y, wallBottom));
                            
                            const distX = x - closestX;
                            const distY = y - closestY;
                            const dist = Math.sqrt(distX * distX + distY * distY);
                            
                            if (dist < radius) return true;
                        }
                    }
                }
            }
            return false;
        }

        function resetPlayer() {
            deaths++;
            totalDeaths++;
            document.getElementById('deaths').textContent = deaths;
            initPlayer();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 80;
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function updatePlayer() {
            let dx = 0, dy = 0;
            
            const isUp = keys['ArrowUp'] || keys['w'];
            const isDown = keys['ArrowDown'] || keys['s'];
            const isLeft = keys['ArrowLeft'] || keys['a'];
            const isRight = keys['ArrowRight'] || keys['d'];
            
            if (isLeft) dx -= player.speed;
            if (isRight) dx += player.speed;
            if (isUp) dy -= player.speed;
            if (isDown) dy += player.speed;
            
            if (joystickActive && joystickForce > 0.1) {
                dx += Math.cos(joystickAngle) * player.speed * joystickForce;
                dy += Math.sin(joystickAngle) * player.speed * joystickForce;
            }
            
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }
            
            const newX = player.x + dx;
            const newY = player.y + dy;
            
            if (!checkWallCollision(newX, player.y, player.radius)) {
                player.x = newX;
            } else {
                resetPlayer();
                return;
            }
            
            if (!checkWallCollision(player.x, newY, player.radius)) {
                player.y = newY;
            } else {
                resetPlayer();
                return;
            }
            
            const distToGoal = Math.sqrt((player.x - goal.x)**2 + (player.y - goal.y)**2);
            if (distToGoal < player.radius + cellSize * 0.3) {
                stopBytebeat();
                const finalTime = ((Date.now() - startTime) / 1000);
                
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.5);
                    }, i * 120);
                });
                
                saveScore(finalTime, totalDeaths, currentLevel);
                showVictoryScreen();
            }
        }

        function showVictoryScreen() {
            cancelAnimationFrame(animationId);
            const screen = document.getElementById('victoryScreen');
            const message = document.getElementById('victoryMessage');
            
            const randomMessage = brutalMessages[Math.floor(Math.random() * brutalMessages.length)];
            message.textContent = randomMessage;
            
            screen.style.display = 'flex';
        }

        function nextLevel() {
            currentLevel++;
            document.getElementById('level').textContent = currentLevel;
            document.getElementById('victoryScreen').style.display = 'none';
            
            const newNumKillers = Math.min(50, parseInt(document.getElementById('killersInput').value) + 2);
            document.getElementById('killersInput').value = newNumKillers;
            
            generateMaze();
            initPlayer();
            initKillers(newNumKillers);
            drawMaze();
            drawGoal();
            drawPlayer();
            drawKillers();
            
            deaths = 0;
            document.getElementById('deaths').textContent = deaths;
            startTime = Date.now();
            
            startBytebeat();
            gameLoop();
        }

        function updateKillers() {
            for (const killer of killers) {
                const gridX = Math.floor(killer.x / cellSize);
                const gridY = Math.floor(killer.y / cellSize);
                
                killer.x += killer.dir[0] * killer.speed;
                killer.y += killer.dir[1] * killer.speed;
                
                const newGridX = Math.floor(killer.x / cellSize);
                const newGridY = Math.floor(killer.y / cellSize);
                
                if (checkWallCollision(killer.x, killer.y, killer.radius) || 
                    newGridX !== gridX || newGridY !== gridY) {
                    
                    killer.x = gridX * cellSize + cellSize/2;
                    killer.y = gridY * cellSize + cellSize/2;
                    
                    const possibleDirs = [];
                    const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
                    
                    for (const dir of dirs) {
                        const testX = gridX + dir[0];
                        const testY = gridY + dir[1];
                        
                        if (testX >= 0 && testX < mazeWidth && 
                            testY >= 0 && testY < mazeHeight && 
                            maze[testY][testX] === 0 &&
                            !(dir[0] === -killer.dir[0] && dir[1] === -killer.dir[1])) {
                            possibleDirs.push(dir);
                        }
                    }
                    
                    const canContinue = possibleDirs.some(d => 
                        d[0] === killer.dir[0] && d[1] === killer.dir[1]
                    );
                    
                    if (canContinue && Math.random() < 0.7) {
                        // Continue straight
                    } else if (possibleDirs.length > 0) {
                        killer.dir = possibleDirs[Math.floor(Math.random() * possibleDirs.length)];
                    } else {
                        killer.dir = [-killer.dir[0], -killer.dir[1]];
                    }
                }
                
                const dist = Math.sqrt((player.x - killer.x)**2 + (player.y - killer.y)**2);
                if (dist < player.radius + killer.radius) {
                    resetPlayer();
                }
            }
        }

        function gameLoop() {
            updatePlayer();
            updateKillers();
            drawPlayer();
            drawKillers();
            
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('time').textContent = elapsed + 's';
            
            animationId = requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        svg.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
